<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fametro Cursos{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{ url_for('home') }}">
        <img class="brand-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="Fametro Tecnico">
      </a>

      <nav class="header-actions">
        <a class="header-link" href="{{ url_for('home') }}#catalogo">Cursos</a>
        {% if is_admin %}
          <a class="header-link" href="{{ url_for('admin_dashboard') }}">Painel</a>
          <form method="post" action="{{ url_for('admin_logout') }}">
            <button class="button button-outline" type="submit">Sair</button>
          </form>
        {% else %}
          <a class="button button-outline" href="{{ url_for('admin_login') }}">Área do admin</a>
        {% endif %}
      </nav>
    </div>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-stack container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
